<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="福岡7日遊">
<meta name="theme-color" content="#e11d48">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>跟著 Young 走不會錯 - 福岡 7 日遊 🗾</title>
<style>
:root{
  --pri:#e11d48; --pril:#ffe4e6; --prid:#9f1239;
  --sea:#0ea5e9; --seal:#e0f2fe;
  --ok:#059669; --warn:#d97706; --gold:#ca8a04;
  --bg:#fafaf9; --card:#ffffff;
  --g100:#f5f5f4; --g200:#e7e5e4; --g300:#d6d3d1;
  --g500:#78716c; --g600:#57534e; --g700:#44403c; --g900:#1c1917;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--g900);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Hiragino Sans","Microsoft JhengHei",sans-serif;
  line-height:1.6;font-size:16px}
body{padding-bottom:76px}

/* Header */
header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,var(--pri),var(--prid));
  color:#fff;padding:14px 16px 12px;box-shadow:var(--shadow)}
header h1{font-size:19px;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
header .sub{font-size:12px;opacity:.9;margin-top:2px}

/* Day tabs */
.daytabs{display:flex;gap:6px;overflow-x:auto;padding:10px 12px;background:var(--card);
  border-bottom:1px solid var(--g200);position:sticky;top:60px;z-index:40;-webkit-overflow-scrolling:touch}
.daytabs::-webkit-scrollbar{display:none}
.daytab{flex:0 0 auto;border:1.5px solid var(--g200);background:var(--card);border-radius:14px;
  padding:7px 12px;font-size:13px;font-weight:700;color:var(--g600);cursor:pointer;text-align:center;line-height:1.25;min-width:62px}
.daytab .d{font-size:11px;font-weight:600;color:var(--g500)}
.daytab.active{background:var(--pri);border-color:var(--pri);color:#fff}
.daytab.active .d{color:#ffe4e6}

/* Content */
main{padding:14px 12px 20px;max-width:640px;margin:0 auto}
.dayhead{display:flex;align-items:baseline;gap:10px;margin:2px 0 12px;flex-wrap:wrap}
.dayhead .big{font-size:22px;font-weight:800}
.dayhead .theme{font-size:14px;color:var(--pri);font-weight:700}
.dayhead .jp{font-size:12px;color:var(--g500)}

.card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;border:1px solid var(--g100)}
.card-h{display:flex;align-items:center;gap:8px;padding:12px 14px;font-weight:800;font-size:15px;background:var(--g100);border-bottom:1px solid var(--g200);flex-wrap:wrap}
.card-h .ico{font-size:18px}
.card-b{padding:12px 14px}
.cardnum{background:var(--pri);color:#fff;font-size:12px;font-weight:800;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.reorder-btns{margin-left:auto;display:flex;gap:4px}
.ordbtn{background:var(--card);border:1px solid var(--g200);border-radius:8px;width:28px;height:28px;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--g600);cursor:pointer;flex-shrink:0}
.ordbtn:active{background:var(--g100)}
.ordbtn:disabled{opacity:.25}
.daytools{display:flex;justify-content:flex-end;margin:2px 0 10px}
.resetbtn{font-size:12px;color:var(--g600);background:none;border:none;text-decoration:underline;cursor:pointer;padding:4px}
.packrow{display:flex;align-items:center;gap:10px;padding:10px 2px;border-bottom:1px solid var(--g100)}
.packrow:last-child{border-bottom:none}
.packrow input[type=checkbox]{width:20px;height:20px;flex-shrink:0;accent-color:var(--pri)}
.packrow .ptxt{flex:1;font-size:15px;word-break:break-word}
.packrow.checked .ptxt{text-decoration:line-through;color:var(--g400)}
.packdel{background:none;border:none;color:var(--g400);font-size:16px;padding:4px 6px;cursor:pointer;flex-shrink:0}
.packadd{display:flex;gap:8px;margin-top:4px}
.packadd input{flex:1;border:1px solid var(--g200);border-radius:10px;padding:10px 12px;font-size:15px}
.packadd button{flex-shrink:0}
.packprog{font-size:13px;color:var(--g600);margin-bottom:8px}
.packbar{height:6px;background:var(--g100);border-radius:99px;overflow:hidden;margin-bottom:14px}
.packbar-fill{height:100%;background:var(--ok);border-radius:99px;transition:width .2s}

/* Timeline / steps */
.step{display:flex;gap:11px;padding:9px 0;border-bottom:1px dashed var(--g200)}
.step:last-child{border-bottom:none}
.step .dot{flex:0 0 auto;width:11px;height:11px;border-radius:50%;background:var(--pri);margin-top:7px;box-shadow:0 0 0 3px var(--pril)}
.step.sea .dot{background:var(--sea);box-shadow:0 0 0 3px var(--seal)}
.step .body{flex:1;min-width:0}
.step .t{font-weight:700;font-size:15px}
.step .t .jpn{font-weight:500;color:var(--g500);font-size:12px}
.step .meta{font-size:13px;color:var(--g600);margin-top:2px}
.time{display:inline-block;background:var(--seal);color:#0369a1;font-weight:700;font-size:12px;
  padding:1px 8px;border-radius:8px;margin-right:6px}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:1px 7px;border-radius:7px;margin:3px 4px 0 0}
.tag.hr{background:var(--g100);color:var(--g600)}
.tag.tip{background:#fef3c7;color:var(--gold)}
.tag.must{background:var(--pril);color:var(--prid)}

/* map link */
.maplink{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:#fff;
  background:var(--sea);padding:3px 9px;border-radius:9px;text-decoration:none;margin-top:5px}
.maplink:active{background:#0284c7}
.piclink{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:#fff;
  background:var(--pri);padding:3px 9px;border-radius:9px;text-decoration:none;margin:5px 0 0 5px}
.piclink:active{background:var(--prid)}
a.tel{color:var(--pri);font-weight:700;text-decoration:none}

/* food list */
.food{padding:8px 0;border-bottom:1px dashed var(--g200)}
.food:last-child{border-bottom:none}
.food .n{font-weight:700;font-size:14px}
.food .n .jpn{font-weight:500;color:var(--g500);font-size:12px}
.food .d{font-size:13px;color:var(--g600);margin-top:1px}

/* note box */
.note{background:#fffbeb;border-left:4px solid var(--warn);padding:9px 12px;border-radius:0 10px 10px 0;font-size:13px;color:#78350f;margin:8px 0}
.note b{color:#92400e}

/* PIN */
.lockwrap{text-align:center;padding:30px 18px}
.lockwrap .lk{font-size:46px}
.lockwrap h2{font-size:18px;margin:10px 0 4px}
.lockwrap p{font-size:13px;color:var(--g600);margin-bottom:16px}
.pinbox{display:flex;gap:8px;justify-content:center;margin:8px 0 14px}
.pinbox input{width:48px;height:56px;text-align:center;font-size:24px;font-weight:800;border:2px solid var(--g300);
  border-radius:12px;background:var(--card)}
.pinbox input:focus{border-color:var(--pri);outline:none}
.btn{background:var(--pri);color:#fff;border:none;border-radius:12px;padding:12px 22px;font-size:15px;font-weight:700;cursor:pointer}
.btn.ghost{background:var(--g100);color:var(--g700)}
.errmsg{color:var(--pri);font-size:13px;font-weight:700;min-height:18px}

/* bottom nav */
nav{position:fixed;bottom:0;left:0;right:0;z-index:60;background:var(--card);border-top:1px solid var(--g200);
  display:flex;padding:6px 4px 8px;box-shadow:0 -1px 6px rgba(0,0,0,.05)}
nav button{flex:1;background:none;border:none;font-size:10px;font-weight:700;color:var(--g500);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 2px}
nav button .ni{font-size:20px}
nav button.active{color:var(--pri)}
.hidden{display:none!important}
.mini{font-size:11px;color:var(--g500)}

/* travel mode bar */
.modebar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--seal);
  border-bottom:1px solid var(--g200);overflow-x:auto}
.modebar::-webkit-scrollbar{display:none}
.modebar .mlabel{font-size:12px;font-weight:700;color:#0369a1;flex:0 0 auto}
.mbtn{flex:0 0 auto;border:1.5px solid #bae6fd;background:#fff;color:#0369a1;border-radius:20px;
  padding:5px 12px;font-size:13px;font-weight:700;cursor:pointer}
.mbtn.active{background:var(--sea);border-color:var(--sea);color:#fff}

/* floating where-am-I button */
.fab{position:fixed;right:14px;bottom:86px;z-index:70;background:var(--sea);color:#fff;border:none;
  border-radius:26px;padding:12px 16px;font-size:14px;font-weight:800;cursor:pointer;
  box-shadow:0 3px 10px rgba(2,132,199,.4)}
.fab:active{background:#0284c7}
.fab.busy{opacity:.6}

/* collapsible insider tips */
.tips{margin-top:7px}
.tipToggle{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:10px;
  padding:4px 11px;font-size:12px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.tipToggle:active{background:#fef3c7}
.tipToggle .arw{font-size:10px}
.tipBody{margin-top:6px;background:#fffbeb;border-left:3px solid var(--warn);border-radius:0 8px 8px 0;padding:5px 10px}
.tipItem{font-size:12.5px;color:#78350f;padding:3px 0;display:flex;gap:7px;line-height:1.55;align-items:flex-start}
.tt{flex:0 0 auto;font-weight:800;font-size:10.5px;padding:1px 6px;border-radius:6px;margin-top:2px;white-space:nowrap}
.tt.queue{background:#fef3c7;color:#b45309}
.tt.warn{background:#fed7aa;color:#c2410c}
.tt.no{background:#fecaca;color:#b91c1c}
.tt.pro{background:#d1fae5;color:#047857}
.tt.close{background:#e5e7eb;color:#374151}
.tt.spoil{background:#ede9fe;color:#6d28d9}

/* audio guide */
.guide{margin-top:7px}
.guideBar{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.glabel{font-size:12px;font-weight:800;color:#6d28d9}
.gbtn{background:#ede9fe;border:1px solid #ddd6fe;color:#6d28d9;border-radius:10px;
  padding:4px 10px;font-size:12px;font-weight:800;cursor:pointer}
.gbtn:active{background:#ddd6fe}
.gbtn.stop{background:#f3f4f6;border-color:#e5e7eb;color:#4b5563}
.gbtn.on{background:#8b5cf6;border-color:#8b5cf6;color:#fff}
.guideText{margin-top:6px;background:#f5f3ff;border-left:3px solid #8b5cf6;border-radius:0 8px 8px 0;
  padding:7px 11px;font-size:12.5px;color:#4c1d95;line-height:1.65}
.guideText .en{display:block;margin-top:5px;color:#5b21b6;font-style:italic}

/* AI helper */
.flbl{display:block;font-size:12px;font-weight:700;color:var(--g600);margin:8px 0 3px}
.fld{width:100%;border:1.5px solid var(--g300);border-radius:10px;padding:9px 11px;font-size:14px;font-family:inherit;background:var(--card)}
.fld:focus{outline:none;border-color:var(--pri)}
.chipRow{display:flex;gap:6px;overflow-x:auto;padding:2px 0 10px}
.chipRow::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;background:var(--pril);border:1px solid #fecdd3;color:var(--prid);border-radius:16px;
  padding:6px 12px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap}
.chip:active{background:#fecdd3}
.chatMsgs{min-height:180px;max-height:calc(100vh - 330px);overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:4px 0}
.msg{max-width:86%;padding:9px 12px;border-radius:14px;font-size:14px;line-height:1.55;word-break:break-word}
.msg.u{align-self:flex-end;background:var(--pri);color:#fff;border-bottom-right-radius:4px}
.msg.a{align-self:flex-start;background:var(--card);border:1px solid var(--g200);color:var(--g900);border-bottom-left-radius:4px}
.chatBar{display:flex;gap:8px;position:sticky;bottom:80px;background:var(--bg);padding:8px 0 4px}
.chatInput{flex:1;border:1.5px solid var(--g300);border-radius:22px;padding:10px 16px;font-size:15px;font-family:inherit;background:var(--card)}
.chatInput:focus{outline:none;border-color:var(--pri)}
.chatSend{flex:0 0 auto;width:44px;border:none;border-radius:50%;background:var(--pri);color:#fff;font-size:18px;cursor:pointer}
.chatSend:active{background:var(--prid)}
</style>
</head>
<body>

<header>
  <h1>🗾 跟著 Young 走不會錯 <span style="font-weight:600;font-size:13px;opacity:.85">福岡 7 日遊 2026</span></h1>
  <div class="sub">7/16（四）– 7/22（三）・博多祇園櫛田神社前西鐵克魯姆酒店</div>
</header>

<!-- DAY TABS -->
<div class="daytabs" id="daytabs"></div>

<!-- TRAVEL MODE BAR -->
<div class="modebar">
  <span class="mlabel">🧭 導航方式</span>
  <button data-m="walking" class="mbtn">🚶 步行</button>
  <button data-m="transit" class="mbtn">🚆 大眾</button>
  <button data-m="driving" class="mbtn">🚗 開車</button>
</div>

<main id="main"></main>

<!-- WHERE AM I (floating) -->
<button id="fabLoc" class="fab">🧭 我在哪</button>

<!-- BOTTOM NAV -->
<nav id="nav">
  <button data-view="days" class="active"><span class="ni">📅</span>行程</button>
  <button data-view="food"><span class="ni">🍜</span>美食</button>
  <button data-view="buy"><span class="ni">🎁</span>採買</button>
  <button data-view="konbini"><span class="ni">🏪</span>超商</button>
  <button data-view="pack"><span class="ni">🎒</span>備品</button>
  <button data-view="helper"><span class="ni">🤖</span>小幫手</button>
  <button data-view="private"><span class="ni">🔒</span>私人</button>
</nav>

<script>
/* ---------- helpers ---------- */
let travelMode = localStorage.getItem('fuk_mode') || 'transit';
function gmap(q){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q);}
function gdir(q){return 'https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(q)+'&travelmode='+travelMode;}
function ml(q,label){return '<a class="maplink" target="_blank" rel="noopener" href="'+gdir(q)+'">🧭 '+(label||'導航')+'</a>';}
function ph(q){return '<a class="piclink" target="_blank" rel="noopener" href="'+gmap(q)+'">📷 照片</a>';}

/* ---------- insider tips (tap to reveal) ---------- */
const LBL={queue:'⏳ 排隊',warn:'⚠️ 注意',no:'🚫 千萬別',pro:'💡 秘訣',close:'📅 公休',spoil:'🔮 暴雷'};
const TIPS={
 '西鉄イン福岡 櫛田神社前':[
   {k:'no',x:'大件行李務必走 6 號出口電梯！直接從 4／5 號出口爬樓梯會相當辛苦。'},
   {k:'pro',x:'大浴場冰棒福利只有晚上 15:00–01:00 有，早上泡完是沒得吃的。'},
   {k:'warn',x:'大浴巾、毛巾房內不提供，要自己帶去大浴場。'},
   {k:'pro',x:'續住為環保不會天天打掃，想要完整清潔跟櫃檯說一聲即可。'},
 ],
 '一蘭 総本店 博多':[
   {k:'pro',x:'24 小時營業；早上 8:00–8:15 有太鼓表演可以看。'},
 ],
 '一蘭 キャナルシティ博多':[
   {k:'pro',x:'方形碗（釜だれ豚骨）只有博多運河城店和天神西通店吃得到，別家沒有。'},
 ],
 '麺屋一矢 中洲':[
   {k:'pro',x:'原本不在口袋名單，因飯店人員推薦才去，結果成了此行最愛。'},
   {k:'warn',x:'營業分兩段：11:00–14:00 與 20:00–04:00，別跑空。'},
 ],
 'キャナルシティ ラーメンスタジアム':[
   {k:'pro',x:'運河城 5 樓拉麵競技場，多家名店集中，可一次比較。'},
 ],
 'B-speak 湯布院':[
   {k:'warn',x:'生乳捲需電話預約（電話在 🔒 私人頁），確定取貨日再打即可，沒規定要提前多久。'},
   {k:'queue',x:'人氣名店，現場常常賣完，建議先預約。'},
 ],
 'homme blue cafe 湯布院':[
   {k:'no',x:'店內嚴格禁止拍照，別舉相機。'},
 ],
 '湯之坪街道 富士食品':[
   {k:'pro',x:'轉角水果店的草莓一盒只要 ¥500–800，又香又甜，比超市還便宜。'},
   {k:'spoil',x:'幾乎每個去過的人都後悔沒多買幾盒，看到就直接下手。'},
 ],
 '今泉堂 湯布院':[
   {k:'pro',x:'金鱗湖旁步行僅 5 分；招牌是沖繩黑糖皮＋北海道十勝紅豆的黑糖炸饅頭。'},
 ],
 '由布院駅':[
   {k:'pro',x:'由布號／由布院之森班次密集；回程搭之森 6 號時可在車上／車站買伴手禮。'},
 ],
 '九州 FUNPASS':[
   {k:'warn',x:'若最後不去皿倉山，記得重新算交通費，看買 FUNPASS 划不划算。'},
 ],
 '門司港駅':[
   {k:'warn',x:'搭山陽新幹線的旅客要先走「新幹線轉 JR」專用閘門，再依「鹿兒島本線・門司港方面」指標找正確月台。'},
 ],
 '関門トンネル人道 めかり':[
   {k:'pro',x:'徒步穿越海底人行隧道到和布刈，在觀潮公園記念碑前拍照可拿官方「踏破證明書」。'},
 ],
 '皿倉山ケーブルカー':[
   {k:'warn',x:'JR 八幡站下車後要轉 TAXI 約 10 分才到纜車站，再搭纜車 10 分到山頂。'},
   {k:'pro',x:'出發前先查好假日班表（官網），末班別錯過。'},
 ],
 '太宰府天満宮':[
   {k:'queue',x:'御守很搶手，尤其「梳子御守」，早上九點多去就可能只剩幾個。'},
   {k:'pro',x:'想要的御守建議一早就衝，聽說很容易完售。'},
 ],
 '一蘭 太宰府参道店':[
   {k:'pro',x:'五角碗與長達 59cm 的麵條都取「合格」諧音好彩頭；9:00 開，可當早餐吃。'},
 ],
 '筑紫庵 本店 太宰府':[
   {k:'warn',x:'店員只會日文，直接拿餐點圖片指給店員點最快。'},
 ],
 'スターバックス 太宰府天満宮表参道店':[
   {k:'queue',x:'隈研吾設計的名店，人潮多要有排隊心理準備。'},
   {k:'pro',x:'2000＋根木條斜向交織、內部完全沒用金屬釘，值得抬頭看。'},
 ],
 'full full 天神':[
   {k:'close',x:'週二公休。'},
   {k:'pro',x:'明太子麵包人氣超高，建議先繞去拿。'},
 ],
 '草千里ヶ浜':[
   {k:'warn',x:'依火山活動與風向，B1／B2／C／D 區可能臨時管制，請留意廣播、聽從火山口監視員指揮。'},
 ],
 '道の駅 阿蘇':[
   {k:'pro',x:'ASO MILK 牛奶餅乾（牛造型）是人氣 No.1 伴手禮。'},
   {k:'pro',x:'現場便當有加熱服務，買馬肉／紅牛便當可請店家加熱。'},
 ],
 '阿蘇神社':[
   {k:'pro',x:'開放 9:00–17:00；門前町商店街的とり宮馬肉可樂餅 08:00–19:00 順路吃。'},
 ],

let speaking=null;
function warmVoices(){ try{ speechSynthesis.getVoices(); }catch(e){} }
if('speechSynthesis' in window){ warmVoices(); speechSynthesis.onvoiceschanged=warmVoices; }
function speak(key,lang,btn){
  if(!('speechSynthesis' in window)){ alert('此瀏覽器不支援語音，請改用 Safari 或 Chrome。'); return; }
  const g=GUIDE[key]; if(!g) return;
  speechSynthesis.cancel();
  document.querySelectorAll('.gbtn.on').forEach(b=>b.classList.remove('on'));
  const u=new SpeechSynthesisUtterance(lang==='en'?g.en:g.zh);
  u.lang=lang==='en'?'en-US':'zh-TW'; u.rate=0.96; u.pitch=1;
  const vs=speechSynthesis.getVoices();
  const v=vs.find(v=>(v.lang||'').toLowerCase().startsWith(lang==='en'?'en':'zh'));
  if(v)u.voice=v;
  if(btn)btn.classList.add('on');
  u.onend=()=>{ if(btn)btn.classList.remove('on'); };
  speechSynthesis.speak(u);
}
function stopSpeak(){ try{speechSynthesis.cancel();}catch(e){} document.querySelectorAll('.gbtn.on').forEach(b=>b.classList.remove('on')); }
function toggleGuideText(btn){ btn.parentElement.nextElementSibling.classList.toggle('hidden'); }
function guideHtml(key){
  const g=GUIDE[key]; if(!g) return '';
  const k=key.replace(/"/g,'&quot;');
  return '<div class="guide"><div class="guideBar"><span class="glabel">🎧 語音導覽</span>'+
    '<button class="gbtn" onclick="speak(\''+k+'\',\'zh\',this)">🔊 中文</button>'+
    '<button class="gbtn" onclick="speak(\''+k+'\',\'en\',this)">🔊 EN</button>'+
    '<button class="gbtn stop" onclick="stopSpeak()">⏹</button>'+
    '<button class="gbtn" onclick="toggleGuideText(this)">📖 文字</button></div>'+
    '<div class="guideText hidden">'+g.zh+'<span class="en">'+g.en+'</span></div></div>';
}

function stepHtml(s,sea){
  let m = s.meta||'';

  return '<div class="step'+(sea?' sea':'')+'"><span class="dot"></span><div class="body">'+
    '<div class="t">'+s.t+(s.jpn?' <span class="jpn">'+s.jpn+'</span>':'')+'</div>'+

}
function foodHtml(f){
  return '<div class="food"><div class="n">'+f.n+(f.jpn?' <span class="jpn">'+f.jpn+'</span>':'')+'</div>'+
    (f.d?'<div class="d">'+f.d+'</div>':'')+ (f.map?ml(f.map,f.map)+ph(f.map):'') + tipsHtml(f.map||f.n) +'</div>';

function renderDays(){
  setNav('days'); buildDayTabs();

    '<span class="theme">'+d.theme+'</span><span class="jp">'+d.jp+'</span></div>';
  h += '<div class="daytools"><button class="resetbtn" onclick="resetOrder()">↺ 還原本日原始順序</button></div>';
  d.cards.forEach((c,idx)=>{
    const isFirst = idx===0, isLast = idx===d.cards.length-1;
    h += '<div class="card"><div class="card-h"><span class="cardnum">'+(idx+1)+'</span><span class="ico">'+c.ico+'</span>'+c.h+
      '<span class="reorder-btns">'+
        '<button class="ordbtn" onclick="moveCard('+idx+',-1)"'+(isFirst?' disabled':'')+'>▲</button>'+
        '<button class="ordbtn" onclick="moveCard('+idx+',1)"'+(isLast?' disabled':'')+'>▼</button>'+
      '</span></div><div class="card-b">';
    if(c.steps) h += c.steps.map(s=>stepHtml(s, c.h.indexOf('皿倉')>-1||c.h.indexOf('渡輪')>-1)).join('');
    if(c.foods) h += c.foods.map(foodHtml).join('');

function saveOrder(d){
  localStorage.setItem('fuk_order_'+d.date, JSON.stringify(d.cards.map(c=>c.h)));
}
function moveCard(idx, dir){
  const d = DAYS[curDay];
  const j = idx + dir;
  if(j < 0 || j >= d.cards.length) return;
  const tmp = d.cards[idx]; d.cards[idx] = d.cards[j]; d.cards[j] = tmp;
  saveOrder(d);
  renderDays();
}
function resetOrder(){
  const d = DAYS[curDay];
  const orig = ORIGINAL_DAYS[curDay];
  d.cards = JSON.parse(JSON.stringify(orig.cards));
  localStorage.removeItem('fuk_order_'+d.date);
  renderDays();
}
function applySavedOrder(){
  DAYS.forEach(d=>{
    const saved = localStorage.getItem('fuk_order_'+d.date);
    if(!saved) return;
    try{
      const order = JSON.parse(saved);
      const map = {}; d.cards.forEach(c=>{ map[c.h] = map[c.h] || []; map[c.h].push(c); });
      const newCards = [];
      order.forEach(h=>{ if(map[h] && map[h].length) newCards.push(map[h].shift()); });
      d.cards.forEach(c=>{ if(!newCards.includes(c)) newCards.push(c); });
      d.cards = newCards;
    }catch(e){}
  });
}

      (c.foods||[]).forEach(x=>parts.push(x.n+(x.d?'（'+x.d+'）':'')));

function chipAsk(b){ const inp=document.getElementById('chatInput'); if(inp){inp.value=b.textContent; sendChat();} }
function paintChat(){
  const el=document.getElementById('chatMsgs'); if(!el)return;
  el.innerHTML=chatHistory.map(m=>'<div class="msg '+(m.role==='user'?'u':'a')+'">'+esc(m.text).replace(/\n/g,'<br>')+'</div>').join('');
  el.scrollTop=el.scrollHeight;
}
async function sendChat(){
  const inp=document.getElementById('chatInput'); if(!inp)return;
  const text=inp.value.trim(); if(!text)return; inp.value='';
  const cfg=getAICfg(); if(!cfg.key){showAISettings();return;}
  chatHistory.push({role:'user',text});
  const ph={role:'assistant',text:'⏳ 思考中…'}; chatHistory.push(ph); paintChat();
  try{
    const prior=chatHistory.slice(0,-2);
    ph.text=await callAI(cfg, buildContext(), prior, text);
  }catch(e){ ph.text='⚠️ 出錯了：'+e.message+'\n（請檢查 API Key／網路，或到 ⚙️ 設定更換）'; }
  paintChat();
}
async function callAI(cfg,sys,hist,user){
  const model=cfg.model||defModel(cfg.provider);
  if(cfg.provider==='openai') return callOpenAI(cfg.key,model,sys,hist,user);
  return callGemini(cfg.key,model,sys,hist,user);
}
async function callGemini(key,model,sys,hist,user){
  const contents=hist.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.text}]}));
  contents.push({role:'user',parts:[{text:user}]});
  const body={system_instruction:{parts:[{text:sys}]},contents:contents,generationConfig:{temperature:0.4}};
  const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+encodeURIComponent(model)+':generateContent?key='+encodeURIComponent(key),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const j=await r.json();
  if(!r.ok) throw new Error((j.error&&j.error.message)||('HTTP '+r.status));
  return (j.candidates&&j.candidates[0]&&j.candidates[0].content&&j.candidates[0].content.parts&&j.candidates[0].content.parts[0].text)||'(沒有回應內容)';
}
async function callOpenAI(key,model,sys,hist,user){
  const messages=[{role:'system',content:sys}];
  hist.forEach(m=>messages.push({role:m.role,content:m.text}));
  messages.push({role:'user',content:user});
  const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:model,messages:messages,temperature:0.4})});
  const j=await r.json();
  if(!r.ok) throw new Error((j.error&&j.error.message)||('HTTP '+r.status));
  return (j.choices&&j.choices[0]&&j.choices[0].message&&j.choices[0].message.content)||'(沒有回應內容)';
}

function wirePins(cb){
  const ins=[0,1,2,3].map(i=>document.getElementById('p'+i));
  ins.forEach((inp,i)=>{
    inp.oninput=()=>{ inp.value=inp.value.replace(/[^0-9]/g,''); if(inp.value&&i<3)ins[i+1].focus(); if(i===3&&inp.value)cb(ins.map(x=>x.value).join('')); };
    inp.onkeydown=(e)=>{ if(e.key==='Backspace'&&!inp.value&&i>0)ins[i-1].focus(); if(e.key==='Enter')cb(ins.map(x=>x.value).join('')); };
  });
  ins[0].focus();
  return ()=>ins.map(x=>x.value).join('');
}

    '<button class="btn ghost" id="rstBtn">忘記密碼</button></div></div></div>';
  const check=(v)=>{ if(v===localStorage.getItem('fuk_pin')){sessionUnlocked=true;showPrivate();}
    else{document.getElementById('err').textContent='密碼錯誤，再試一次';[0,1,2,3].forEach(i=>document.getElementById('p'+i).value='');document.getElementById('p0').focus();} };
  const getv=wirePins(check);
  document.getElementById('okBtn').onclick=()=>check(getv());
  document.getElementById('rstBtn').onclick=()=>{
    if(confirm('重設密碼會清除目前 PIN（不影響資料內容），確定？')){localStorage.removeItem('fuk_pin');showSetPin();}
  };
}
function pv(id){return localStorage.getItem('fuk_pv_'+id)||'';}
function showPrivate(){
  let h='<div class="dayhead"><span class="big">🔓 私人資訊</span>'+
    '<span class="mini" style="color:var(--g500)">・僅存這支手機</span></div>';
  h+='<div class="note">這裡的欄位<b>由你自己填寫</b>，只會存在這支手機的瀏覽器（localStorage），<b>不會上傳、不會外流</b>。填完按「💾 儲存」。</div>';
  PRIVATE_FIELDS.forEach(s=>{
    h+='<div class="card"><div class="card-h"><span class="ico">'+s.ico+'</span>'+s.title+'</div><div class="card-b">';
    s.fields.forEach(f=>{
      h+='<label class="flbl">'+f.label+'</label>';
      if(f.ml) h+='<textarea class="fld" data-pv="'+f.id+'" rows="2" placeholder="（自行填寫）">'+esc(pv(f.id))+'</textarea>';
      else h+='<input class="fld" data-pv="'+f.id+'" placeholder="（自行填寫）" value="'+esc(pv(f.id))+'">';
    });
    h+='</div></div>';
  });
  h+='<div style="display:flex;gap:8px;justify-content:center;margin:6px 0 4px">'+
     '<button class="btn" id="pvSave">💾 儲存</button>'+
     '<button class="btn ghost" onclick="sessionUnlocked=false;renderPrivate()">🔒 重新鎖定</button></div>';
  main.innerHTML=h; window.scrollTo(0,0);
  document.getElementById('pvSave').onclick=()=>{
    document.querySelectorAll('[data-pv]').forEach(el=>localStorage.setItem('fuk_pv_'+el.dataset.pv, el.value));
    const b=document.getElementById('pvSave'); b.textContent='✅ 已儲存'; setTimeout(()=>{b.textContent='💾 儲存';},1500);
  };
}

/* ---- 備品 checklist ---- */
function loadPackList(){
  const saved = localStorage.getItem('fuk_pack');
  if(saved){
    try{ return JSON.parse(saved); }catch(e){}
  }
  const list = PACK_DEFAULT.map((t,i)=>({id:'d'+i, t:t, c:false}));
  savePackList(list);
  return list;
}
function savePackList(list){ localStorage.setItem('fuk_pack', JSON.stringify(list)); }
function renderPack(){
  setNav('pack'); tabsEl.classList.add('hidden');
  const list = loadPackList();
  const done = list.filter(x=>x.c).length;
  const pct = list.length ? Math.round(done/list.length*100) : 0;
  let h = '<div class="dayhead"><span class="big">🎒 備品清單</span>'+
    '<span class="mini" style="color:var(--g500)">・僅存這支手機</span></div>';
  h += '<div class="card"><div class="card-b">';
  h += '<div class="packprog">已準備 '+done+' / '+list.length+'（'+pct+'%）</div>';
  h += '<div class="packbar"><div class="packbar-fill" style="width:'+pct+'%"></div></div>';
  h += '<div class="packadd"><input id="packInput" placeholder="新增品項，例如：泳衣" maxlength="40">'+
       '<button class="btn" id="packAddBtn">➕ 新增</button></div>';
  h += '</div></div>';
  h += '<div class="card"><div class="card-b" id="packListBox">';
  if(!list.length){
    h += '<div class="note">目前沒有品項，上面輸入框新增第一個吧。</div>';
  } else {
    list.forEach(item=>{
      h += '<div class="packrow'+(item.c?' checked':'')+'" data-id="'+item.id+'">'+
        '<input type="checkbox" '+(item.c?'checked':'')+'>'+
        '<span class="ptxt">'+esc(item.t)+'</span>'+
        '<button class="packdel">✕</button></div>';
    });
  }
  h += '</div></div>';
  if(list.length){
    h += '<div style="display:flex;justify-content:center;margin:6px 0 4px">'+
      '<button class="resetbtn" id="packClearBtn">↺ 全部取消勾選</button></div>';
  }
  main.innerHTML = h; window.scrollTo(0,0);

  document.getElementById('packAddBtn').onclick=addPackItem;
  document.getElementById('packInput').onkeydown=(e)=>{ if(e.key==='Enter') addPackItem(); };
  document.querySelectorAll('#packListBox .packrow').forEach(row=>{
    const id=row.dataset.id;
    row.querySelector('input[type=checkbox]').onchange=(e)=>togglePackItem(id, e.target.checked);
    row.querySelector('.packdel').onclick=()=>deletePackItem(id);
  });
}
function addPackItem(){
  const inp = document.getElementById('packInput');
  const t = inp.value.trim();
  if(!t) return;
  const list = loadPackList();
  list.push({id:'u'+Date.now(), t:t, c:false});
  savePackList(list);
  renderPack();
}
function togglePackItem(id, checked){
  const list = loadPackList();
  const it = list.find(x=>x.id===id);
  if(it){ it.c = checked; savePackList(list); }
  const row = document.querySelector('#packListBox .packrow[data-id="'+id+'"]');
  if(row) row.classList.toggle('checked', checked);
  const done = list.filter(x=>x.c).length, pct = list.length ? Math.round(done/list.length*100) : 0;
  const prog = document.querySelector('.packprog'); if(prog) prog.textContent='已準備 '+done+' / '+list.length+'（'+pct+'%）';
  const fill = document.querySelector('.packbar-fill'); if(fill) fill.style.width = pct+'%';
}
function deletePackItem(id){
  let list = loadPackList();
  list = list.filter(x=>x.id!==id);
  savePackList(list);
  renderPack();
}
document.addEventListener('click', (e)=>{
  if(e.target && e.target.id==='packClearBtn'){
    const list = loadPackList().map(x=>({...x, c:false}));
    savePackList(list);
    renderPack();
  }
});

/* ---- nav ---- */
let curView='days';
function setNav(v){
  curView=v;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  if(v==='days')tabsEl.classList.remove('hidden');
  const fab=document.getElementById('fabLoc'); if(fab) fab.style.display=(v==='helper')?'none':'';
}
function rerender(){
  if(curView==='days')renderDays();
  else if(curView==='food')renderFood();
  else if(curView==='buy')renderBuy();
  else if(curView==='konbini')renderKonbini();
  else if(curView==='pack')renderPack();
  else if(curView==='private')renderPrivate();
}

/* ---- travel mode ---- */
function paintMode(){
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.toggle('active',b.dataset.m===travelMode));
}
document.querySelectorAll('.mbtn').forEach(b=>b.onclick=()=>{
  travelMode=b.dataset.m; localStorage.setItem('fuk_mode',travelMode); paintMode(); rerender();
});
paintMode();

/* ---- where am I (GPS) ---- */
document.getElementById('fabLoc').onclick=function(){
  const fab=this;
  if(!navigator.geolocation){ window.open('https://www.google.com/maps','_blank'); return; }
  fab.classList.add('busy'); fab.textContent='📡 定位中…';
  navigator.geolocation.getCurrentPosition(
    p=>{ fab.classList.remove('busy'); fab.textContent='🧭 我在哪';
      const {latitude:la,longitude:lo}=p.coords;
      window.open('https://www.google.com/maps/search/?api=1&query='+la+','+lo,'_blank'); },
    err=>{ fab.classList.remove('busy'); fab.textContent='🧭 我在哪';
      alert('無法取得定位。\n請確認已允許定位權限，或在手機的 Google 地圖 App 直接查看目前位置。');
      window.open('https://www.google.com/maps','_blank'); },
    {enableHighAccuracy:true, timeout:8000, maximumAge:60000}
  );
};
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>{
  const v=b.dataset.view;
  if(v==='days')renderDays();
  else if(v==='food')renderFood();
  else if(v==='buy')renderBuy();
  else if(v==='konbini')renderKonbini();
  else if(v==='pack')renderPack();
  else if(v==='helper')renderHelper();
  else if(v==='private')renderPrivate();
});

/* init */
applySavedOrder();
renderDays();

/* PWA offline support */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
